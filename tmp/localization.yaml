/**:
    ros__parameters:
      # Localization Algorithm (NDT or ICP)
      registration_method: "NDT"
      
      # NDT Parameters
      ndt_resolution: 2.0
      ndt_step_size: 0.1
      transform_epsilon: 0.01
      
      # Point Cloud Parameters
      voxel_leaf_size: 0.3
      scan_max_range: 100.0
      scan_min_range: 0.5
      scan_period: 0.05
      
      # Map Configuration
      use_pcd_map: true
      map_path: "/ros2_ws/src/DEOS/deos_ws/src/perception/sensor_fusion/config/my_map.pcd"
      
      # Initial Pose
      set_initial_pose: true
      initial_pose_x: 0.0
      initial_pose_y: 0.0
      initial_pose_z: 0.0
      initial_pose_qx: 0.0
      initial_pose_qy: 0.0
      initial_pose_qz: 0.0
      initial_pose_qw: 1.0
      
      # Sensor Fusion with EKF
      use_odom: true
      use_imu: true
      
      # Input Topic - Using your SICK Multiscan topics
      input_topic: "/cloud_unstructured_fullframe"
      
      # Frame IDs
      odom_frame: "odom"
      map_frame: "map"
      base_frame: "base_link"
      
      # Debug
      enable_debug: false
